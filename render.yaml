services:
  # 1. Node.js Backend
  - type: web
    name: verishield-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Must be set manually in Render dashboard
      - key: AI_SERVICE_URL
        value: https://verishield-ai-service.onrender.com

  # 2. Python AI Service
  - type: web
    name: verishield-ai-service
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
